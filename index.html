<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CalcNum Pro" />
    <meta name="description" content="CalcNum Pro v6.0 - Calculadora multibase, Casio fx-991CW y TI-Nspire CX. Funciona offline." />
    <meta name="application-name" content="CalcNum Pro" />
    
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    
    <title>CalcNum Pro v6.0</title>
    
    <style>
      :root {
        --calc-bg: #1a1a2e;
        --display-bg: #9ea792;
        --display-text: #1a1c18;
        --btn-bg: #e8e8e8;
        --btn-text: #2c3e50;
        --btn-shadow: #b8b8b8;
        --btn-selected: #3498db;
        --accent-orange: #e67e22;
        --accent-red: #e74c3c;
        --accent-green: #27ae60;
        --accent-purple: #9b59b6;
        --accent-blue: #3498db;
        --accent-teal: #1abc9c;
        --accent-pink: #e91e63;
        --border: #0f3460;
        --text-primary: #ffffff;
        --text-secondary: #888888;
        --bg-body: #1e3c72;
        --panel-bg: rgba(0,0,0,0.2);
        --font-size-base: 16px;
      }
      
      [data-theme="light"] {
        --calc-bg: #f5f5f5;
        --display-bg: #e8e8e8;
        --display-text: #2c3e50;
        --btn-bg: #ffffff;
        --btn-text: #2c3e50;
        --btn-shadow: #cccccc;
        --border: #bdc3c7;
        --text-primary: #2c3e50;
        --text-secondary: #7f8c8d;
        --bg-body: #667eea;
        --panel-bg: rgba(255,255,255,0.5);
      }
      
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        min-height: 100vh;
        padding: 8px;
        transition: all 0.3s;
      }
      
      @media (max-width: 480px) { body { padding: 4px; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(function(reg) { console.log('[PWA] SW registrado:', reg.scope); })
          .catch(function(err) { console.log('[PWA] SW error:', err); });
      }
    </script>
  </body>
</html>
